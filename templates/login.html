<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueGuard | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-t-blue-500">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight"><i
                    class="fa-solid fa-shield-halved text-blue-500 mr-2"></i>BLUE<span
                    class="text-blue-500">GUARD</span></h1>
            <p class="text-slate-400 text-sm mt-2 uppercase tracking-widest">Authentication Gateway</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded mb-6 text-sm">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ error }}
        </div>
        {% endif %}
        {% if msg %}
        <div class="bg-emerald-500/20 border border-emerald-500 text-emerald-400 px-4 py-3 rounded mb-6 text-sm">
            <i class="fa-solid fa-check mr-2"></i> {{ msg }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="username">Analyst ID /
                    Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-500"></i>
                    </div>
                    <input type="text" name="username" id="username"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                        placeholder="e.g. Harsh Patel" required minlength="3" maxlength="20" pattern="^[a-zA-Z0-9_]+$"
                        title="Username must be 3-20 characters and contain only letters, numbers, or underscores">
                </div>
            </div>
            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="password">Security Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-500"></i>
                    </div>
                    <input type="password" name="password" id="password"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                        placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg shadow-blue-500/30 flex justify-center items-center">
                Access Dashboard <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
        </form>

        <p class="text-center text-slate-500 text-sm mt-8">
            New SOC Analyst? <a href="/register"
                class="text-blue-400 hover:text-blue-300 font-semibold transition">Request Clearance</a>
        </p>
    </div>
</body>

</html>
