<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueGuard | Analyst Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-t-emerald-500">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight"><i
                    class="fa-solid fa-shield-halved text-emerald-500 mr-2"></i>BLUE<span
                    class="text-emerald-500">GUARD</span></h1>
            <p class="text-slate-400 text-sm mt-2 uppercase tracking-widest">New Analyst Enlistment</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded mb-6 text-sm">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="username">Desired Analyst ID</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user-shield text-slate-500"></i>
                    </div>
                    <input type="text" name="username" id="username"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                        placeholder="e.g. Harsh Patel" required minlength="3" maxlength="20" pattern="^[a-zA-Z0-9_]+$"
                        title="Username must be 3-20 characters and contain only letters, numbers, or underscores">
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="email">Official Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-envelope text-slate-500"></i>
                    </div>
                    <input type="email" name="email" id="email"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                        placeholder="analyst@soc.local" required>
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="role">Clearance Level (Role)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-id-badge text-slate-500"></i>
                    </div>
                    <select name="role" id="role"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white appearance-none focus:outline-none focus:border-emerald-500 transition">
                        <option value="Tier 1 Analyst">Tier 1 Analyst (Triage)</option>
                        <option value="Tier 2 Responder">Tier 2 Responder</option>
                        <option value="SOC Manager">SOC Manager</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-sm font-semibold mb-2" for="password">Create Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-slate-500"></i>
                    </div>
                    <input type="password" name="password" id="password"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3 pl-10 px-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                        placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg shadow-emerald-500/30 flex justify-center items-center mt-2">
                Register Clearance <i class="fa-solid fa-check-circle ml-2"></i>
            </button>
        </form>

        <p class="text-center text-slate-500 text-sm mt-6">
            Already have clearance? <a href="/login"
                class="text-emerald-400 hover:text-emerald-300 font-semibold transition">Login Here</a>
        </p>
    </div>
</body>

</html>
